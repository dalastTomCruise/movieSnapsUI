<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Guessing Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1rem; letter-spacing: 0.05em; color: #fff; }

    /* Loading */
    #loading-view { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem; }
    .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #e0b030; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    #error-view { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 2rem; text-align: center; }
    #error-message { color: #ff6b6b; font-size: 1rem; }

    /* Image Viewer */
    #image-viewer { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 900px; gap: 0.75rem; }
    .image-wrapper { position: relative; width: 100%; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
    #screenshot { width: 100%; max-width: 100%; height: auto; display: block; }
    .nav-controls { display: flex; align-items: center; gap: 1.5rem; }
    .nav-btn {
      width: 48px; height: 48px; min-width: 44px; min-height: 44px;
      border: none; border-radius: 50%; background: #2a2a2a; color: #f0f0f0;
      font-size: 1.25rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: #e0b030; color: #0f0f0f; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #counter { font-size: 0.95rem; color: #aaa; min-width: 60px; text-align: center; }

    /* Reveal Panel */
    #reveal-panel { display: none; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 900px; background: #1a1a1a; border-radius: 8px; padding: 1.25rem; margin-top: 0.5rem; }
    #reveal-panel h2 { font-size: 1.4rem; color: #e0b030; }
    #reveal-panel .meta { font-size: 0.9rem; color: #aaa; }
    #reveal-panel .synopsis { font-size: 0.95rem; line-height: 1.5; margin-top: 0.5rem; }
    #reveal-panel .cast { font-size: 0.85rem; color: #ccc; margin-top: 0.25rem; }

    /* Action Bar */
    #action-bar { display: none; gap: 1rem; margin-top: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .action-btn { padding: 0.65rem 1.5rem; min-height: 44px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 0.85; }
    #btn-new { background: #3a7bd5; color: #fff; }
    #btn-skip { background: #2a2a2a; color: #f0f0f0; }
    #btn-hint { background: #1e3a5f; color: #7eb8f7; border: 1px solid #2a5a8f; }

    /* Hints */
    #hints-panel { display: none; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 900px; margin-top: 0.5rem; }
    .hint-item { background: #1a1a1a; border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 0.95rem; display: flex; align-items: center; gap: 0.75rem; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .hint-label { color: #e0b030; font-weight: 600; min-width: 60px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .hint-value { color: #f0f0f0; }

    /* Guess Panel */
    #guess-panel { display: none; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 900px; margin-top: 0.75rem; }
    #guess-panel p { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
    .guess-btn { width: 100%; padding: 0.75rem 1.25rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #f0f0f0; font-size: 0.95rem; text-align: left; cursor: pointer; transition: all 0.15s ease; }
    .guess-btn:hover:not(:disabled) { border-color: #e0b030; color: #e0b030; }
    .guess-btn.correct { background: #0d3320; border-color: #2ecc71; color: #2ecc71; }
    .guess-btn.wrong { background: #3a0d0d; border-color: #e05050; color: #e05050; }

    /* Decade Picker */
    #decade-bar { width: 100%; max-width: 900px; margin-bottom: 1rem; }
    #decade-bar label { display: block; color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    #decade-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .decade-pill { padding: 0.4rem 1rem; min-height: 36px; border: 1px solid #2a2a2a; border-radius: 999px; background: #1a1a1a; color: #aaa; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
    .decade-pill:hover { border-color: #e0b030; color: #e0b030; }
    .decade-pill.active { background: #e0b030; border-color: #e0b030; color: #0f0f0f; font-weight: 700; }

    /* Mode Toggle */
    #mode-toggle { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 999px; padding: 0.25rem; }
    .mode-btn { padding: 0.4rem 1.1rem; min-height: 34px; border: none; border-radius: 999px; background: transparent; color: #aaa; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; }
    .mode-btn.active { background: #e0b030; color: #0f0f0f; }
    .mode-btn.hard.active { background: #e05050; color: #fff; }

    /* Timer */
    #timer-bar { width: 100%; max-width: 900px; margin-bottom: 0.5rem; display: none; flex-direction: column; gap: 0.35rem; }
    #timer-track { width: 100%; height: 6px; background: #2a2a2a; border-radius: 999px; overflow: hidden; }
    #timer-fill { height: 100%; width: 100%; background: #2ecc71; border-radius: 999px; transition: width 1s linear, background 0.5s; }
    #timer-label { font-size: 0.8rem; color: #aaa; text-align: right; font-variant-numeric: tabular-nums; }
    #timer-label.urgent { color: #e05050; font-weight: 700; }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      h1 { font-size: 1.1rem; margin-bottom: 0.5rem; }
      #image-viewer { gap: 0.5rem; }
      .image-wrapper { border-radius: 6px; }
      #screenshot { min-height: 52vw; object-fit: cover; }
      .nav-btn { width: 44px; height: 44px; font-size: 1.1rem; }
      #decade-bar { margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body>
  <h1>🎬 Movie Guessing Game</h1>

  <!-- Mode Toggle -->
  <div id="mode-toggle">
    <button class="mode-btn active" id="btn-normal-mode">Normal</button>
    <button class="mode-btn hard" id="btn-hard-mode">⏱ Hard</button>
  </div>

  <!-- Timer Bar -->
  <div id="timer-bar" aria-live="polite">
    <div id="timer-track"><div id="timer-fill"></div></div>
    <span id="timer-label">90s</span>
  </div>

  <!-- Decade Picker -->
  <div id="decade-bar" style="display:none;">
    <label>Filter by decade</label>
    <div id="decade-pills">
      <button class="decade-pill active" data-decade="">All</button>
    </div>
  </div>

  <!-- Loading View -->
  <section id="loading-view" aria-live="polite" aria-label="Loading">
    <div class="spinner" role="status"></div>
    <p>Loading movie…</p>
  </section>

  <!-- Error View -->
  <section id="error-view" aria-live="assertive" aria-label="Error">
    <p id="error-message">Something went wrong.</p>
    <button class="action-btn" id="btn-retry" style="background:#e05050;color:#fff;">Try Again</button>
  </section>

  <!-- Image Viewer -->
  <section id="image-viewer" aria-label="Screenshot viewer">
    <div class="image-wrapper">
      <img id="screenshot" src="" alt="Movie screenshot" />
    </div>
    <div class="nav-controls">
      <button class="nav-btn" id="btn-left" aria-label="Previous screenshot">&#8592;</button>
      <span id="counter">1 / 1</span>
      <button class="nav-btn" id="btn-right" aria-label="Next screenshot">&#8594;</button>
    </div>
  </section>

  <!-- Hints Panel -->
  <section id="hints-panel" aria-label="Hints">
    <div id="hint-year" class="hint-item" style="display:none">
      <span class="hint-label">Year</span>
      <span class="hint-value" id="hint-year-val"></span>
    </div>
    <div id="hint-genres" class="hint-item" style="display:none">
      <span class="hint-label">Genres</span>
      <span class="hint-value" id="hint-genres-val"></span>
    </div>
    <div id="hint-cast" class="hint-item" style="display:none">
      <span class="hint-label">Cast</span>
      <span class="hint-value" id="hint-cast-val"></span>
    </div>
  </section>

  <!-- Guess Panel -->
  <section id="guess-panel" aria-label="Guess the movie">
    <p>Which movie is this?</p>
    <div id="guess-options"></div>
  </section>

  <!-- Reveal Panel -->
  <section id="reveal-panel" aria-label="Movie details">
    <h2 id="reveal-title"></h2>
    <p class="meta" id="reveal-meta"></p>
    <p class="synopsis" id="reveal-synopsis"></p>
    <p class="cast" id="reveal-cast"></p>
  </section>

  <!-- Action Bar -->
  <div id="action-bar">
    <button class="action-btn" id="btn-hint">Show Hint</button>
    <button class="action-btn" id="btn-skip">Next Movie</button>
    <button class="action-btn" id="btn-new">Next Movie</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
